# vaultpatch configuration example
# Copy to vaultpatch.yaml and fill in your values.

# Default Vault secrets mount used when a namespace does not specify one.
default_mount: secret

namespaces:
  # Production Vault cluster
  - name: prod
    address: https://vault.prod.example.com
    # Environment variable that holds the Vault token for this namespace.
    token_env: VAULT_TOKEN_PROD
    mount: kv

  # Staging Vault cluster
  - name: staging
    address: https://vault.staging.example.com
    token_env: VAULT_TOKEN_STAGING
    # mount omitted — falls back to default_mount

  # Local development (Vault dev server)
  - name: local
    address: http://127.0.0.1:8200
    token_env: VAULT_TOKEN  # default env var
    mount: secret
